<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delta Tiers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #080a0e;
    --bg2:      #0d1017;
    --bg3:      #12161e;
    --bg4:      #171c26;
    --border:   rgba(255,255,255,0.06);
    --border2:  rgba(255,255,255,0.1);
    --text:     #e8eaf0;
    --muted:    #5a6070;
    --dimmer:   #363d4a;
    --gold:     #f5c842;
    --gold2:    #ffdd80;
    --silver:   #b8c4d0;
    --bronze:   #d4874a;
    --t1:       #f5c842;
    --t2:       #b8c4d0;
    --t3:       #d4874a;
    --t4:       #667080;
    --t5:       #3a4050;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── ANIMATED BACKGROUND ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(245,200,66,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(99,140,255,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 50% 50%, rgba(245,200,66,0.02) 0%, transparent 70%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,10,14,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    max-width: 1280px; margin: 0 auto;
    display: flex; align-items: center; gap: 12px;
    padding: 0 20px; height: 76px;
  }
  .nav-logo { height: 62px; object-fit: contain; flex-shrink: 0; }
  .nav-logo-fallback {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 900; letter-spacing: 0.08em;
    color: var(--gold); text-transform: uppercase; flex-shrink: 0;
  }
  .nav-divider { width: 1px; height: 24px; background: var(--border2); flex-shrink: 0; }
  .nav-search-wrap { position: relative; flex: 1; max-width: 280px; }
  .nav-search {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 12px 7px 34px;
    color: var(--text); font-family: 'Barlow', sans-serif; font-size: 13px;
    outline: none; transition: border-color 0.2s, background 0.2s;
  }
  .nav-search::placeholder { color: var(--muted); }
  .nav-search:focus { border-color: rgba(245,200,66,0.3); background: var(--bg4); }
  .nav-search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--muted); pointer-events: none;
  }
  .nav-spacer { flex: 1; }
  .points-btn {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 6px 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .points-btn:hover { color: var(--gold); border-color: rgba(245,200,66,0.3); }
  .discord-btn {
    display: flex; align-items: center; gap: 7px;
    background: var(--gold); color: #0a0800;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 7px 14px; border-radius: 8px; text-decoration: none;
    transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
  }
  .discord-btn:hover { background: var(--gold2); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(245,200,66,0.3); }

  /* ── TABS ── */
  .tabs-bar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
  }
  .tabs-inner {
    max-width: 1280px; margin: 0 auto;
    display: flex; gap: 0; overflow-x: auto; scrollbar-width: none;
  }
  .tabs-inner::-webkit-scrollbar { display: none; }
  .mode-tab {
    display: flex; flex-direction: row; align-items: center; gap: 8px;
    padding: 0 18px; height: 48px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--muted); cursor: pointer;
    background: none; border: none; border-bottom: 2px solid transparent;
    white-space: nowrap; transition: all 0.18s ease; flex-shrink: 0; position: relative;
  }
  .mode-tab:hover { color: var(--text); }
  .mode-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .mode-tab img { width: 20px; height: 20px; object-fit: contain; opacity: 0.6; transition: opacity 0.18s; }
  .mode-tab:hover img, .mode-tab.active img { opacity: 1; }
  .mode-tab .tab-icon { font-size: 17px; line-height: 1; opacity: 0.7; transition: opacity 0.18s; }
  .mode-tab:hover .tab-icon, .mode-tab.active .tab-icon { opacity: 1; }
  .mode-tab .tab-label { display: none; }
  .mode-tab.active .tab-label { display: inline; }

  /* ── MAIN ── */
  .main {
    position: relative; z-index: 1;
    max-width: 1280px; margin: 0 auto;
    padding: 28px 20px;
  }

  /* ── TABLE VIEW ── */
  .list-header {
    display: grid;
    grid-template-columns: 56px 1fr 80px 1fr;
    padding: 0 16px 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
  }

  .player-row {
    display: grid;
    grid-template-columns: 56px 1fr 80px 1fr;
    align-items: center;
    padding: 8px 16px;
    border-radius: 10px;
    cursor: pointer; margin-bottom: 3px;
    border: 1px solid transparent;
    transition: all 0.18s ease;
    position: relative; overflow: hidden;
  }
  .player-row::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    border-radius: 3px 0 0 3px; opacity: 0; transition: opacity 0.18s;
  }
  .player-row:hover { background: var(--bg3); border-color: var(--border2); }
  .player-row:hover::before { opacity: 1; background: var(--gold); }

  .player-row.rank-1 { background: linear-gradient(90deg, rgba(245,200,66,0.08) 0%, transparent 60%); border-color: rgba(245,200,66,0.15); }
  .player-row.rank-1::before { opacity: 1; background: var(--gold); }
  .player-row.rank-2 { background: linear-gradient(90deg, rgba(184,196,208,0.06) 0%, transparent 60%); border-color: rgba(184,196,208,0.1); }
  .player-row.rank-2::before { opacity: 1; background: var(--silver); }
  .player-row.rank-3 { background: linear-gradient(90deg, rgba(212,135,74,0.06) 0%, transparent 60%); border-color: rgba(212,135,74,0.1); }
  .player-row.rank-3::before { opacity: 1; background: var(--bronze); }

  .rank-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 800; color: var(--muted);
    letter-spacing: -0.02em;
  }
  .rank-num.r1 { color: var(--gold); }
  .rank-num.r2 { color: var(--silver); }
  .rank-num.r3 { color: var(--bronze); }

  .player-cell { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .player-bust {
    width: 44px; height: 44px; border-radius: 8px;
    object-fit: cover; image-rendering: pixelated;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .player-info { min-width: 0; }
  .player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700; letter-spacing: 0.02em;
    display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .name-gold { color: var(--gold); }
  .name-silver { color: var(--silver); }
  .name-bronze { color: var(--bronze); }

  .player-title-row {
    display: flex; align-items: center; gap: 5px; margin-top: 1px;
  }
  .title-dot { font-size: 8px; }
  .title-name { font-size: 11px; font-weight: 500; }
  .title-pts { font-size: 11px; color: var(--muted); }

  .region-cell {}
  .region-badge {
    display: inline-block;
    background: var(--bg4); border: 1px solid var(--border);
    border-radius: 5px; padding: 3px 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    color: var(--muted);
  }

  .tiers-cell { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .tier-badge {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .tier-icon-ring {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid; display: flex; align-items: center; justify-content: center;
    background: var(--bg3);
  }
  .tier-icon-ring img { width: 20px; height: 20px; object-fit: contain; }
  .ring-1 { border-color: var(--t1); box-shadow: 0 0 8px rgba(245,200,66,0.25); }
  .ring-2 { border-color: var(--t2); }
  .ring-3 { border-color: var(--t3); }
  .ring-4 { border-color: var(--t4); }
  .ring-5 { border-color: var(--t5); }

  .tier-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 800; letter-spacing: 0.04em; }
  .tier-label.HT1, .tier-label.RHT1 { color: #fff0a0; }
  .tier-label.LT1, .tier-label.RLT1 { color: var(--gold); }
  .tier-label.HT2, .tier-label.RHT2 { color: #e0e8f0; }
  .tier-label.LT2, .tier-label.RLT2 { color: var(--silver); }
  .tier-label.HT3, .tier-label.RHT3 { color: #e8a870; }
  .tier-label.LT3, .tier-label.RLT3 { color: var(--bronze); }
  .tier-label.HT4, .tier-label.RHT4 { color: #8090a0; }
  .tier-label.LT4, .tier-label.RLT4 { color: var(--t4); }
  .tier-label.HT5, .tier-label.RHT5 { color: #505860; }
  .tier-label.LT5, .tier-label.RLT5 { color: var(--t5); }

  /* ── ROW ANIMATE ── */
  @keyframes rowIn {
    from { opacity: 0; transform: translateX(-12px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .row-animate { animation: rowIn 0.3s ease both; }

  /* ── TIER GRID ── */
  .tier-grid-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 8px; }
  .tier-grid-wrap::-webkit-scrollbar { height: 4px; }
  .tier-grid-wrap::-webkit-scrollbar-track { background: transparent; }
  .tier-grid-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .tier-grid { display: grid; grid-template-columns: repeat(5, minmax(170px, 1fr)); gap: 12px; min-width: 100%; }

  .tier-col { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: var(--bg2); }
  .tier-col-header {
    padding: 12px 16px; font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .th1 .tier-col-header { color: var(--t1); background: rgba(245,200,66,0.07); }
  .th2 .tier-col-header { color: var(--t2); background: rgba(184,196,208,0.05); }
  .th3 .tier-col-header { color: var(--t3); background: rgba(212,135,74,0.05); }
  .th4 .tier-col-header { color: var(--t4); background: rgba(102,112,128,0.05); }
  .th5 .tier-col-header { color: var(--t5); background: rgba(58,64,80,0.05); }

  .tier-col-body { padding: 8px; display: flex; flex-direction: column; gap: 4px; }

  .tier-player-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 10px; border-radius: 8px; cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s ease;
    background: var(--bg3);
  }
  .tier-player-card:hover { background: var(--bg4); border-color: var(--border2); }
  .tier-player-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .tier-player-head { width: 24px; height: 24px; border-radius: 4px; image-rendering: pixelated; flex-shrink: 0; }
  .tier-player-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  @keyframes cardIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .card-animate { animation: cardIn 0.25s ease both; }

  /* ── SKELETON ── */
  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  .skel {
    background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
    background-size: 800px 100%;
    animation: shimmer 1.4s ease-in-out infinite;
    border-radius: 6px;
  }
  .skel-row {
    display: grid; grid-template-columns: 56px 1fr 80px 1fr;
    align-items: center; padding: 12px 16px; margin-bottom: 3px;
    border-radius: 10px; background: var(--bg2);
    border: 1px solid var(--border);
  }

  /* ── MODAL ── */
  #modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-box {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 20px; width: 100%; max-width: 380px;
    position: relative; overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04);
  }
  .modal-box::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 200px;
    background: radial-gradient(ellipse at 50% 0%, rgba(245,200,66,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .modal-close {
    position: absolute; top: 14px; right: 14px; z-index: 2;
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--muted); cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .modal-close:hover { color: var(--text); background: var(--bg4); }
  .modal-header { padding: 32px 24px 20px; text-align: center; position: relative; }
  .modal-skin {
    height: 190px; image-rendering: pixelated;
    display: block; margin: 0 auto 16px;
    transform-origin: center bottom;
    animation: skinFloat 3s ease-in-out infinite;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6));
    object-fit: contain;
  }
  .modal-skin:hover { animation-play-state: paused; transform: scale(1.06) translateY(-4px); }
  @keyframes skinFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .modal-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px; font-weight: 900; letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .name-gold { color: var(--gold); }
  .name-silver { color: var(--silver); }
  .name-bronze { color: var(--bronze); }
  .modal-rank-badge {
    margin-top: 6px; font-size: 12px; font-weight: 500; color: var(--muted);
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .modal-divider { height: 1px; background: var(--border); margin: 0 24px; }
  .modal-body { padding: 20px 24px 24px; }
  .modal-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-box {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; text-align: center;
  }
  .stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
  .stat-value { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 800; }
  .stat-value.gold { color: var(--gold); }
  .modal-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px; }
  .modal-tiers { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .modal-tier-box {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px; text-align: center;
  }
  .modal-tier-box-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 6px; }
  .modal-tier-icon { width: 24px; height: 24px; object-fit: contain; margin: 0 auto 6px; display: block; }
  .modal-tier-val { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; }
  .modal-tier-val.HT1,.modal-tier-val.LT1 { color: var(--gold); }
  .modal-tier-val.HT2,.modal-tier-val.LT2 { color: var(--silver); }
  .modal-tier-val.HT3,.modal-tier-val.LT3 { color: var(--bronze); }
  .modal-tier-val.HT4,.modal-tier-val.LT4 { color: var(--t4); }
  .modal-tier-val.HT5,.modal-tier-val.LT5 { color: var(--t5); }

  /* ── POINTS OVERLAY ── */
  #points-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .points-box {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 16px; padding: 24px; width: 100%; max-width: 280px;
    position: relative;
    box-shadow: 0 30px 60px rgba(0,0,0,0.7);
  }
  .points-close {
    position: absolute; top: 12px; right: 12px;
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--muted); cursor: pointer; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .points-close:hover { color: var(--text); }
  .points-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 800; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 16px;
  }
  .points-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .points-row:last-child { border-bottom: none; }
  .points-tier { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 800; }
  .points-val { font-size: 13px; font-weight: 600; color: var(--muted); }

  /* ── EMPTY / ERROR ── */
  .empty { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 14px; }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    html, body { overflow-x: hidden; }
    .nav-divider { display: none; }
    .nav-search-wrap { max-width: 140px; }
    .points-btn span { display: none; }
    .points-btn::after { content: 'pts'; }
    .discord-btn span { display: none; }
    .main { padding: 16px 12px; }
    .list-header, .player-row { grid-template-columns: 44px 1fr 0 1fr; }
    .region-cell { display: none; }
    .tier-grid { grid-template-columns: repeat(5, 150px); }
  }
</style>
</head>
<body>

<script>
  const basePoints = { 'HT1':60,'LT1':45,'HT2':30,'LT2':20,'HT3':10,'LT3':6,'HT4':4,'LT4':3,'HT5':2,'LT5':1 };
  const modeKeys   = ['Spear Mace New Tier','Hole New Tier'];
  const modeLabels = ['Spear Mace','Hole Fight'];
  const iconPaths  = ['icons/spearmace.png','icons/holefight.png'];
  const FALLBACK_HEAD = 'https://minotar.net/helm/c5ad1893-57f0-4a4c-93dc-0e8bef1acce4/40';
  const FALLBACK_FULL = 'https://visage.surgeplay.com/full/350/c5ad1893-57f0-4a4c-93dc-0e8bef1acce4';

  let playersData = [], sortedOverall = [], currentMode = 'Overall';

  function getTitle(pts) {
    if (pts >= 400) return { name: 'Combat Grandmaster', color: '#f5c842' };
    if (pts >= 250) return { name: 'Combat Master',      color: '#639bf5' };
    if (pts >= 150) return { name: 'Combat Ace',         color: '#57ab5a' };
    if (pts >= 80)  return { name: 'Combat Expert',      color: '#daaa3f' };
    if (pts >= 30)  return { name: 'Combat Veteran',     color: '#adbac7' };
    return { name: 'Competitor', color: '#768390' };
  }

  function getTierNum(v) { const m = v.match(/\d/); return m ? parseInt(m[0]) : 5; }
  function getTierRingClass(v) { return `ring-${getTierNum(v)}`; }

  const DIRECT_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQyVAQS4iWEr7Q1CXFfmWGiS5eLpE-IsrNXgVWZrjGYlSQ0Q0iFG4tXD2jP5RXcJjkft93AoMhrNEJp/pub?output=csv';
  const PROXY_URLS = [
    'https://corsproxy.io/?url=' + encodeURIComponent(DIRECT_CSV),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(DIRECT_CSV),
    DIRECT_CSV
  ];

  function processCSV(txt) {
    const r = Papa.parse(txt, { header:true, skipEmptyLines:true });
    playersData = r.data.filter(p=>p.IGN).map(p => {
      let score = 0;
      modeKeys.forEach(m => { if(p[m]){ const c=p[m].trim().toUpperCase().replace(/^R/,''); score+=basePoints[c]||0; }});
      return {...p, totalPoints:score};
    });
    sortedOverall = [...playersData].sort((a,b)=>b.totalPoints-a.totalPoints);
    try { sessionStorage.setItem('dt_cache', JSON.stringify({t:Date.now(),d:playersData})); } catch(e){}
    updateView('Overall');
  }

  let dataLoaded = false;
  async function fetchOne(url) {
    const res = await fetch(url,{cache:'no-store'});
    if(!res.ok) throw new Error('bad');
    const t = await res.text();
    if(!t||t.trim().length<10) throw new Error('empty');
    return t;
  }
  async function fetchFastest(urls) {
    return new Promise((resolve,reject)=>{
      let errors=0;
      urls.forEach(url=>fetchOne(url)
        .then(t=>{ if(!dataLoaded){dataLoaded=true;resolve(t);} })
        .catch(()=>{ errors++; if(errors===urls.length) reject(); })
      );
    });
  }

  async function init() {
    try {
      const cached = sessionStorage.getItem('dt_cache');
      if(cached){
        const obj = JSON.parse(cached);
        if(Date.now()-obj.t < 3*60*1000){
          playersData=obj.d;
          sortedOverall=[...playersData].sort((a,b)=>b.totalPoints-a.totalPoints);
          updateView('Overall');
        }
      }
    } catch(e){}
    try {
      dataLoaded=false;
      const text = await fetchFastest(PROXY_URLS);
      processCSV(text);
    } catch(e) {
      if(!playersData.length)
        document.getElementById('main-content').innerHTML='<div class="empty">Could not load data. Check your connection.</div>';
    }
  }

  function updateView(mode, el) {
    currentMode = mode;
    if(el){ document.querySelectorAll('.mode-tab').forEach(b=>b.classList.remove('active')); el.classList.add('active'); }
    if(!playersData.length) return;
    const q = document.getElementById('search').value.trim().toLowerCase();
    const filtered = q ? playersData.filter(p=>(p.IGN||'').toLowerCase().includes(q)) : playersData;
    const content = document.getElementById('main-content');

    if(mode==='Overall') {
      const sorted = q ? [...filtered].sort((a,b)=>b.totalPoints-a.totalPoints) : sortedOverall;
      let html = `<div class="list-header"><span>#</span><span>Player</span><span>Region</span><span>Tiers</span></div>`;
      const rows = sorted.map((p,i) => {
        const rank = q ? i+1 : sortedOverall.findIndex(x=>x.IGN===p.IGN)+1;
        const title = getTitle(p.totalPoints);
        const region = (p.Region||'').trim()||'—';
        const topClass = rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'';
        const nameClass = rank===1?'name-gold':rank===2?'name-silver':rank===3?'name-bronze':'';
        const nameStyle = (!nameClass&&p.Color)?`style="color:${p.Color.trim()}"`:'';
        const rankClass = rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
        const tierBadges = modeKeys.map((k,idx)=>{
          const val=(p[k]||'').trim().toUpperCase().replace(/^R/,'');
          if(!val) return '';
          return `<div class="tier-badge"><div class="tier-icon-ring ${getTierRingClass(val)}"><img src="${iconPaths[idx]}" alt="" onerror="this.style.display='none'"></div><span class="tier-label ${val}">${val}</span></div>`;
        }).join('');
        return `<div class="player-row ${topClass}" data-ign="${p.IGN}" onclick="openProfile(playersData.find(x=>x.IGN===this.dataset.ign))">
          <div class="rank-num ${rankClass}">${rank}</div>
          <div class="player-cell">
            <img src="https://visage.surgeplay.com/bust/80/${p.IGN}" class="player-bust" onerror="this.src='https://visage.surgeplay.com/bust/80/c5ad1893-57f0-4a4c-93dc-0e8bef1acce4'">
            <div class="player-info">
              <span class="player-name ${nameClass}" ${nameStyle}>${p.IGN}</span>
              <div class="player-title-row">
                <span class="title-dot" style="color:${title.color}">◆</span>
                <span class="title-name" style="color:${title.color}">${title.name}</span>
                <span class="title-pts">${p.totalPoints} pts</span>
              </div>
            </div>
          </div>
          <div class="region-cell"><span class="region-badge">${region}</span></div>
          <div class="tiers-cell">${tierBadges}</div>
        </div>`;
      }).join('');
      content.innerHTML = html + rows;
      content.querySelectorAll('.player-row').forEach((row,i)=>{ row.style.animationDelay=(i*0.03)+'s'; row.classList.add('row-animate'); });
    } else {
      const tierGroups = [1,2,3,4,5].map(tier=>filtered.filter(p=>{
        const v=(p[mode]||'').trim().toUpperCase();
        return v.includes(tier.toString())&&!v.startsWith('R');
      }).sort((a,b)=>{
        const va=a[mode].toUpperCase(), vb=b[mode].toUpperCase();
        if(va.startsWith('HT')&&vb.startsWith('LT')) return -1;
        if(va.startsWith('LT')&&vb.startsWith('HT')) return 1;
        return a.IGN.localeCompare(b.IGN);
      }));
      const thClasses=['th1','th2','th3','th4','th5'];
      const labels=['Tier 1','Tier 2','Tier 3','Tier 4','Tier 5'];
      const icons=['🏆','🥈','🥉','🏅','🎖️'];
      const cols = [0,1,2,3,4].map(idx=>{
        const cards = tierGroups[idx].map(p=>{
          const val=(p[mode]||'').trim().toUpperCase();
          return `<div class="tier-player-card" data-ign="${p.IGN}" onclick="openProfile(playersData.find(x=>x.IGN===this.dataset.ign))">
            <div class="tier-player-left"><img src="https://visage.surgeplay.com/face/26/${p.IGN}" class="tier-player-head" onerror="this.src='https://visage.surgeplay.com/face/26/c5ad1893-57f0-4a4c-93dc-0e8bef1acce4'"><span class="tier-player-name">${p.IGN}</span></div>
            <span class="tier-label ${val}" style="font-size:10px">${val}</span>
          </div>`;
        }).join('');
        return `<div class="tier-col ${thClasses[idx]}">
          <div class="tier-col-header">${icons[idx]} ${labels[idx]}</div>
          <div class="tier-col-body">${cards||'<div style="text-align:center;color:var(--muted);font-size:11px;padding:20px 0">No players</div>'}</div>
        </div>`;
      }).join('');
      content.innerHTML=`<div class="tier-grid-wrap"><div class="tier-grid">${cols}</div></div>`;
      content.querySelectorAll('.tier-player-card').forEach((c,i)=>{ c.style.animationDelay=(i*0.025)+'s'; c.classList.add('card-animate'); });
    }
  }

  function openProfile(p) {
    const body = document.getElementById('modal-body');
    const globalRank = sortedOverall.findIndex(x=>x.IGN===p.IGN)+1;
    const title = getTitle(p.totalPoints);
    const renderUrl = `https://visage.surgeplay.com/full/256/${p.IGN}`;
    const rankColor = globalRank===1?'#f5c842':globalRank===2?'#b8c4d0':globalRank===3?'#d4874a':(p.Color?p.Color.trim():'#e8eaf0');
    const nameClass = globalRank===1?'name-gold':globalRank===2?'name-silver':globalRank===3?'name-bronze':'';
    const nameStyle = (!nameClass&&p.Color)?`style="color:${p.Color.trim()}"`:'';
    const tierBoxes = modeKeys.map((k,i)=>`<div class="modal-tier-box">
      <div class="modal-tier-box-label">${modeLabels[i]}</div>
      <img src="${iconPaths[i]}" class="modal-tier-icon" onerror="this.style.display='none'">
      <div class="modal-tier-val ${(p[k]||'').toUpperCase()}">${p[k]||'—'}</div>
    </div>`).join('');
    body.innerHTML = `
      <div class="modal-header">
        <img src="${renderUrl}" class="modal-skin" onerror="this.src='${FALLBACK_FULL}'">
        <div class="modal-name ${nameClass}" ${nameStyle}>${p.IGN}</div>
        <div class="modal-rank-badge">
          <span style="color:${title.color}">◆</span>
          <span style="color:${title.color}">${title.name}</span>
        </div>
      </div>
      <div class="modal-divider"></div>
      <div class="modal-body">
        <div class="modal-stats">
          <div class="stat-box"><div class="stat-label">Global Score</div><div class="stat-value gold">${p.totalPoints}</div></div>
          <div class="stat-box"><div class="stat-label">Global Rank</div><div class="stat-value" style="color:${rankColor}">#${globalRank}</div></div>
        </div>
        <div class="modal-section-label">Tier Breakdown</div>
        <div class="modal-tiers">${tierBoxes}</div>
      </div>`;
    document.getElementById('modal-overlay').style.display='flex';
  }

  document.getElementById('search').addEventListener('input', ()=>updateView(currentMode));
  init();
</script>
