<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Tiers | Official Rankings</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0810;
            --bg2: #110d1a;
            --bg3: #1a1426;
            --border: #2e1f45;
            --border-hover: #4a3566;
            --text: #e2d4f5;
            --text-muted: #9b7fc2;
            --text-dim: #4a3566;
            --gold: #d8b4fe;
            --silver: #c4aee8;
            --bronze: #b08d57;
            --accent: #a855f7;
            --green: #57ab5a;
            --red: #e5534b;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* NAVBAR */
        nav {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            height: 68px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 0;
            position: sticky;
            top: 0;
            z-index: 200;
        }

        .nav-logo {
            margin-right: 32px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-logo-text {
            display: flex;
            align-items: baseline;
            gap: 3px;
            line-height: 1;
        }
        @keyframes logoFlow {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .logo-delta {
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            background: linear-gradient(90deg, #f3e8ff, #d8b4fe, #a855f7, #7c3aed, #a855f7, #d8b4fe, #f3e8ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: logoFlow 3s ease-in-out infinite;
        }
        .logo-tiers {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            background: linear-gradient(90deg, #7c3aed, #a855f7, #d8b4fe, #a855f7, #7c3aed);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1px;
            animation: logoFlow 3s ease-in-out infinite reverse;
        }


        .nav-links {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 6px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
            background: none;
        }
        .nav-link:hover { background: var(--bg3); color: var(--text); }
        .nav-link.active { background: var(--bg3); color: white; }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .nav-search {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 12px 6px 32px;
            color: var(--text);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            width: 200px;
            outline: none;
            transition: border-color 0.15s;
            position: relative;
        }
        .nav-search:focus { border-color: var(--accent); }
        .search-wrap { position: relative; }
        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .discord-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 6px;
            background: #7c3aed;
            color: white;
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.15s;
            border: none;
            cursor: pointer;
        }
        .discord-btn:hover { background: #6d28d9; transform: translateY(-1px); }

        /* MODE TABS */
        .mode-tabs-wrap {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
        }

        .mode-tabs {
            display: flex;
            gap: 0;
            overflow-x: auto;
            scrollbar-width: none;
            max-width: 1200px;
            margin: 0 auto;
        }
        .mode-tabs::-webkit-scrollbar { display: none; }

        .mode-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 10px 20px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            transition: all 0.15s;
            border-top: none;
            border-left: none;
            border-right: none;
            background: none;
        }
        .mode-tab:hover { color: var(--text); }
        .mode-tab.active {
            color: white;
            border-bottom-color: white;
        }
        .mode-tab img { width: 20px; height: 20px; image-rendering: auto; object-fit: contain; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5)); }
        .mode-tab .tab-icon { font-size: 18px; line-height: 1; }

        /* MAIN */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* TABLE HEADER */
        .table-header {
            display: grid;
            grid-template-columns: 60px 1fr 100px 1fr;
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        /* PLAYER ROW */
        .player-row {
            display: grid;
            grid-template-columns: 60px 1fr 100px 1fr;
            align-items: center;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.12s;
            margin-bottom: 2px;
            border: 1px solid transparent;
        }
        .player-row:hover {
            background: var(--bg2);
            border-color: var(--border);
        }

        .rank-cell {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 800;
            color: var(--text-dim);
        }
        .rank-cell.r1 { color: var(--gold); }
        .rank-cell.r2 { color: var(--silver); }
        .rank-cell.r3 { color: var(--bronze); }

        .rank-medal { font-size: 18px; }

        .player-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-head-3d-wrap {
            width: 52px;
            height: 64px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
            position: relative;
        }
        .player-head-3d {
            height: 64px;
            width: auto;
            image-rendering: pixelated;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.6));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease;
            transform-origin: center bottom;
        }
        .player-row:hover .player-head-3d {
            transform: scale(1.15) translateY(-4px) rotateY(-8deg);
            filter: drop-shadow(0 12px 20px rgba(0,0,0,0.7));
        }

        .player-info { display: flex; flex-direction: column; gap: 2px; }

        .player-name {
            font-size: 15px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.3px;
        }

        .player-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .title-diamond { color: var(--accent); font-size: 10px; }
        .title-pts { color: var(--text-dim); }

        .region-cell {
            display: flex;
            justify-content: center;
        }

        .region-badge {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 3px 8px;
            font-size: 11px;
            font-weight: 800;
            color: var(--text);
        }

        .tiers-cell {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tier-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .tier-icon-wrap {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #1a1426, #0a0810);
            position: relative;
            overflow: visible;
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease;
        }
        .tier-icon-wrap img { width: 18px; height: 18px; image-rendering: auto; object-fit: contain; }

        .tier-label {
            font-size: 9px;
            font-weight: 800;
        }
        .tier-label.HT1, .tier-label.RHT1 { color: #d8b4fe; }
        .tier-label.LT1, .tier-label.RLT1 { color: #e9d5ff; }
        .tier-label.HT2, .tier-label.RHT2 { color: #c084fc; }
        .tier-label.LT2, .tier-label.RLT2 { color: #d8b4fe; }
        .tier-label.HT3, .tier-label.RHT3 { color: #a855f7; }
        .tier-label.LT3, .tier-label.RLT3 { color: #c084fc; }
        .tier-label.HT4, .tier-label.RHT4 { color: #7c3aed; }
        .tier-label.LT4, .tier-label.RLT4 { color: #8b5cf6; }
        .tier-label.HT5, .tier-label.RHT5 { color: #4c1d95; }
        .tier-label.LT5, .tier-label.RLT5 { color: #6d28d9; }

        /* Tier ring colors */
        .ring-1 { border-color: #d8b4fe !important; }
        .ring-2 { border-color: #c084fc !important; }
        .ring-3 { border-color: #a855f7 !important; }
        .ring-4 { border-color: #7c3aed !important; }
        .ring-5 { border-color: #4c1d95 !important; }

        /* TIER VIEW */
        .tier-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
        }
        @media (max-width: 900px) {
            .tier-grid { grid-template-columns: repeat(2, 1fr); }
            .table-header { grid-template-columns: 50px 1fr 70px 1fr; }
            .player-row { grid-template-columns: 50px 1fr 70px 1fr; }
        }
        @media (max-width: 600px) {
            .tier-grid { grid-template-columns: 1fr; }
            .table-header { grid-template-columns: 40px 1fr 1fr; }
            .player-row { grid-template-columns: 40px 1fr 1fr; }
            .region-cell { display: none; }
        }

        .tier-col-header {
            padding: 10px 14px;
            border-radius: 8px 8px 0 0;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-align: center;
            border-bottom: 2px solid;
            margin-bottom: 8px;
        }
        .th1 { background: rgba(227,179,65,0.08); color: var(--gold); border-color: var(--gold); }
        .th2 { background: rgba(173,186,199,0.06); color: var(--silver); border-color: var(--silver); }
        .th3 { background: rgba(176,141,87,0.07); color: var(--bronze); border-color: var(--bronze); }
        .th4 { background: rgba(118,131,144,0.05); color: var(--text-muted); border-color: var(--text-muted); }
        .th5 { background: rgba(68,76,86,0.05); color: var(--text-dim); border-color: var(--text-dim); }

        .tier-player-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            border-radius: 6px;
            background: var(--bg2);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 4px;
        }
        .tier-player-card:hover { background: var(--bg3); border-color: var(--border-hover); }

        .tier-player-left {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
        }
        .tier-player-head {
            width: 26px;
            height: 26px;
            border-radius: 4px;
            image-rendering: pixelated;
            flex-shrink: 0;
        }
        .tier-player-name {
            font-size: 12px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* MODAL */
        #modal-overlay { background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); display: none; position: fixed; inset: 0; z-index: 9999; align-items: center; justify-content: center; padding: 20px; }

        .modal-box {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0;
            max-width: 400px;
            width: 100%;
            position: relative;
            box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(168,85,247,0.15);
            overflow: hidden;
        }

                .modal-header {
            padding: 24px 24px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 24px;
        }

        .modal-skin {
            height: 200px;
            image-rendering: pixelated;
            filter: drop-shadow(0 16px 40px rgba(0,0,0,0.7));
            margin-bottom: 16px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease;
            transform-origin: center bottom;
        }
        .modal-skin:hover { 
            transform: scale(1.08) translateY(-6px) rotateY(-6deg); 
            filter: drop-shadow(0 24px 50px rgba(0,0,0,0.8));
        }

        .modal-name {
            font-size: 26px;
            font-weight: 900;
            color: white;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .modal-rank-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .modal-body { padding: 20px 24px 24px; }

        .modal-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .stat-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 22px;
            font-weight: 900;
            color: white;
        }
        .stat-value.gold { color: var(--gold); }
        .stat-value.accent { color: var(--accent); }

        .modal-tiers {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .modal-tier-box {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        .modal-tier-box-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .modal-tier-val {
            font-size: 14px;
            font-weight: 900;
        }
        .modal-tier-icon {
            width: 26px;
            height: 26px;
            image-rendering: auto;
            object-fit: contain;
            margin: 0 auto 6px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
        }

        /* TITLE RANKS */
        .title-text { font-size: 11px; font-weight: 600; }

        /* LOADING */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            color: var(--text-muted);
            gap: 16px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* EMPTY */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
        }

        /* CLOSE BTN */
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 28px;
            height: 28px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .modal-close:hover { color: white; border-color: var(--border-hover); }

        /* Rank animated names */
        @keyframes flowText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .name-gold {
            background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728, #fcf6ba, #bf953f);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flowText 4s ease-in-out infinite;
        }
        .name-silver {
            background: linear-gradient(90deg, #757575, #e0e0e0, #8d8d8d, #e0e0e0, #757575);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flowText 4s ease-in-out infinite;
        }
        .name-bronze {
            background: linear-gradient(90deg, #804a00, #cd7f32, #b08d57, #cd7f32, #804a00);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flowText 4s ease-in-out infinite;
        }

        /* ════ ANIMATIONS ════ */
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes rowIn {
            from { opacity: 0; transform: translateX(-20px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes cardPop {
            from { opacity: 0; transform: scale(0.9) translateY(12px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes modalSlideUp {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes overlayIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes skinFloat {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-8px); }
        }

        /* ════ BODY FADE ════ */
        /* body animation removed - breaks fixed positioning */

        /* ════ NAVBAR ════ */
        nav { background: rgba(17,13,26,0.95); }
        nav::before { content:''; position:absolute; inset:0; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index:-1; }
        .nav-logo img { transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), filter 0.3s; }
        .nav-logo:hover img { transform: scale(1.06); filter: drop-shadow(0 0 10px rgba(160,100,255,0.5)); }
        .discord-btn { transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1); }
        .discord-btn:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 8px 20px rgba(124,58,237,0.5); }
        .nav-search { transition: all 0.2s ease; }
        .nav-search:focus { box-shadow: 0 0 0 3px rgba(168,85,247,0.2); width: 240px; }

        /* ════ MODE TABS ════ */
        .mode-tab { transition: all 0.2s ease; position: relative; }
        .mode-tab::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 50%; right: 50%;
            height: 2px;
            background: white;
            transition: left 0.25s ease, right 0.25s ease;
            border-radius: 2px 2px 0 0;
        }
        .mode-tab.active::after { left: 0; right: 0; }
        .mode-tab:hover { color: var(--text); background: rgba(255,255,255,0.04); border-radius: 6px 6px 0 0; }
        .mode-tab img { transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), filter 0.25s ease; }
        .mode-tab:hover img, .mode-tab.active img { transform: scale(1.18) rotate(-4deg); filter: drop-shadow(0 2px 6px rgba(160,100,255,0.5)); }

        /* ════ PLAYER ROWS ════ */
        .player-row {
            transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
            will-change: transform, background;
        }
        .player-row:hover {
            transform: translateX(4px);
            background: var(--bg2);
            border-color: var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(168,85,247,0.08);
        }
        .player-row.row-animate {
            animation: rowIn 0.4s cubic-bezier(0.4,0,0.2,1) both;
        }

        /* ════ RANK NUMBERS ════ */
        .rank-cell.r1 { text-shadow: 0 0 20px rgba(227,179,65,0.6); }
        .rank-cell.r2 { text-shadow: 0 0 20px rgba(173,186,199,0.4); }
        .rank-cell.r3 { text-shadow: 0 0 20px rgba(176,141,87,0.4); }

        /* ════ TIER BADGES ════ */
        .tier-icon-wrap { transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); }
        .player-row:hover .tier-icon-wrap { transform: scale(1.12); }
        .ring-1 { box-shadow: 0 0 10px rgba(216,180,254,0.5); }
        .ring-2 { box-shadow: 0 0 10px rgba(192,132,252,0.4); }
        .ring-3 { box-shadow: 0 0 10px rgba(168,85,247,0.3); }

        /* ════ TIER CARDS ════ */
        .tier-player-card {
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
            will-change: transform;
        }
        .tier-player-card:hover {
            transform: translateY(-2px) translateX(3px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.3);
            border-color: var(--border-hover);
        }
        .tier-player-card.card-animate {
            animation: cardPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        /* ════ MODAL ════ */
        /* overlay has no animation */
        .modal-box { animation: modalSlideUp 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
        .modal-skin {
            animation: skinFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 16px 40px rgba(0,0,0,0.7));
        }
        .modal-skin:hover {
            animation-play-state: paused;
            transform: scale(1.08) translateY(-6px) rotateY(-6deg) !important;
            filter: drop-shadow(0 24px 50px rgba(0,0,0,0.8)) !important;
        }
        .stat-box { transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); }
        .stat-box:hover { transform: scale(1.04); border-color: var(--border-hover); background: #1e1530; }
        .modal-tier-box { transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); }
        .modal-tier-box:hover { transform: scale(1.06) translateY(-2px); border-color: var(--border-hover); background: #1e1530; }
        .modal-close { transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); }
        .modal-close:hover { transform: rotate(90deg) scale(1.1); color: white; border-color: var(--border-hover); }

        /* ════ SEARCH ════ */
        .search-wrap::after {
            content: '/';
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 700;
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 1px 5px;
            line-height: 1.4;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        /* ════ REGION BADGE ════ */
        .region-badge { transition: all 0.2s ease; }
        .region-badge:hover { transform: scale(1.08); }

        /* ════ LOADING SPINNER ════ */
        .loading { animation: fadeSlideIn 0.4s ease both; }
        .spinner { box-shadow: 0 0 16px rgba(168,85,247,0.4); }

        /* ════ SCROLLBAR ════ */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ════ SELECTION ════ */
        ::selection { background: rgba(168,85,247,0.3); color: white; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
    <a class="nav-logo" href="#">
        <img src="icons/logo.png" alt="" style="height:42px;width:auto;object-fit:contain;" onerror="this.style.display='none'">
        <span class="nav-logo-text"><span class="logo-delta">DELTA</span><span class="logo-tiers">TIERS</span></span>
    </a>
    <div class="nav-links"></div>
    <div class="nav-right">
        <div class="search-wrap">
            <svg class="search-icon" width="13" height="13" fill="currentColor" viewBox="0 0 16 16">
                <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.44 1.398A5.5 5.5 0 1 1 12.5 6.5a5.5 5.5 0 0 1-5.5 5.5h-.198z"/>
            </svg>
            <input id="search" class="nav-search" type="text" placeholder="Search player...">
        </div>
        <a class="discord-btn" href="https://discord.gg/ySygQVgZzm" target="_blank">
            <svg width="14" height="11" viewBox="0 0 71 55" fill="white"><path d="M60.1 4.9A58.5 58.5 0 0 0 45.5 0a40 40 0 0 0-1.8 3.7 54 54 0 0 0-16.4 0A40 40 0 0 0 25.4 0 58.3 58.3 0 0 0 10.9 4.9C1.6 18.9-1 32.6.3 46c6.2 4.5 12.2 7.3 18.1 9.1a44 44 0 0 0 3.8-6.2 38.3 38.3 0 0 1-6-2.9l1.4-1.1a41.6 41.6 0 0 0 35.7 0c.5.4.9.8 1.4 1.1a38.2 38.2 0 0 1-6 2.9 44 44 0 0 0 3.8 6.2c5.9-1.8 11.9-4.6 18.1-9.1 1.5-15.7-2.5-29.2-10.5-41.1zM23.7 37.7c-3.5 0-6.4-3.2-6.4-7.1s2.8-7.2 6.4-7.2c3.5 0 6.4 3.2 6.3 7.2 0 3.9-2.8 7.1-6.3 7.1zm23.5 0c-3.5 0-6.4-3.2-6.4-7.1s2.8-7.2 6.4-7.2c3.5 0 6.4 3.2 6.4 7.2 0 3.9-2.8 7.1-6.4 7.1z"/></svg>
            Join Discord
        </a>
    </div>
</nav>

<!-- MODE TABS -->
<div class="mode-tabs-wrap">
    <div class="mode-tabs">
        <button class="mode-tab active" onclick="updateView('Overall', this)" data-mode="Overall">
            <span class="tab-icon">🏆</span>
            Overall
        </button>
        <button class="mode-tab" onclick="updateView('Spear Mace New Tier', this)" data-mode="Spear Mace New Tier">
            <img src="icons/spearmace.png" alt="Spear Mace">
            Spear Mace
        </button>
        <button class="mode-tab" onclick="updateView('Hole New Tier', this)" data-mode="Hole New Tier">
            <img src="icons/holefight.png" alt="Hole Fight">
            Hole Fight
        </button>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main">
    <div id="main-content">
        <div class="loading">
            <div class="spinner"></div>
            <span>Loading rankings...</span>
        </div>
    </div>
</div>



<script>
    const basePoints = { 'HT1':60,'LT1':45,'HT2':30,'LT2':20,'HT3':10,'LT3':6,'HT4':4,'LT4':3,'HT5':2,'LT5':1 };
    const modeKeys   = ['Spear Mace New Tier','Hole New Tier'];
    const modeLabels = ['Spear Mace','Hole Fight'];
    const iconPaths  = ['icons/spearmace.png','icons/holefight.png'];
    const FALLBACK_HEAD = 'https://minotar.net/helm/c5ad1893-57f0-4a4c-93dc-0e8bef1acce4/40';
    const FALLBACK_FULL = 'https://visage.surgeplay.com/full/350/c5ad1893-57f0-4a4c-93dc-0e8bef1acce4';

    let playersData = [];
    let sortedOverall = [];
    let currentMode = 'Overall';

    function getTitle(pts) {
        if (pts >= 400) return { name: 'Combat Grandmaster', color: '#e3b341' };
        if (pts >= 250) return { name: 'Combat Master', color: '#539bf5' };
        if (pts >= 150) return { name: 'Combat Ace', color: '#57ab5a' };
        if (pts >= 80)  return { name: 'Combat Expert', color: '#daaa3f' };
        if (pts >= 30)  return { name: 'Combat Veteran', color: '#adbac7' };
        return { name: 'Competitor', color: '#768390' };
    }

    function getTierNum(val) {
        const m = val.match(/\d/);
        return m ? parseInt(m[0]) : 5;
    }

    function getTierRingClass(val) {
        const n = getTierNum(val);
        return `ring-${n}`;
    }

    const DIRECT_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQyVAQS4iWEr7Q1CXFfmWGiS5eLpE-IsrNXgVWZrjGYlSQ0Q0iFG4tXD2jP5RXcJjkft93AoMhrNEJp/pub?output=csv';
    const PROXY_URLS = [
        'https://corsproxy.io/?url=' + encodeURIComponent(DIRECT_CSV),
        'https://api.allorigins.win/raw?url=' + encodeURIComponent(DIRECT_CSV),
        DIRECT_CSV
    ];

    function processCSV(csvText) {
        const r = Papa.parse(csvText, { header: true, skipEmptyLines: true });
        playersData = r.data.filter(p => p.IGN).map(p => {
            let score = 0;
            modeKeys.forEach(m => {
                if (p[m]) {
                    const clean = p[m].trim().toUpperCase().replace(/^R/, '');
                    score += basePoints[clean] || 0;
                }
            });
            return { ...p, totalPoints: score };
        });
        sortedOverall = [...playersData].sort((a,b) => b.totalPoints - a.totalPoints);
        updateView('Overall');
    }

    async function tryFetch(urls, idx = 0) {
        if (idx >= urls.length) {
            document.getElementById('main-content').innerHTML = '<div class="empty">Could not load data. Make sure the Google Sheet is published to web.</div>';
            return;
        }
        try {
            const res = await fetch(urls[idx]);
            if (!res.ok) throw new Error('Bad response');
            const text = await res.text();
            if (!text || text.trim().length < 10) throw new Error('Empty');
            processCSV(text);
        } catch(e) {
            tryFetch(urls, idx + 1);
        }
    }

    async function init() {
        tryFetch(PROXY_URLS);
    }

    function updateView(mode, el) {
        currentMode = mode;
        if (el) {
            document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        const term = document.getElementById('search').value.trim().toLowerCase();
        const filtered = playersData.filter(p => p.IGN.toLowerCase().includes(term));
        const content = document.getElementById('main-content');
        content.style.transition = 'opacity 0.15s ease';
        content.style.opacity = '0';
        setTimeout(() => { content.style.opacity = '1'; }, 150);

        if (mode === 'Overall') {
            const sorted = [...filtered].sort((a,b) => b.totalPoints - a.totalPoints);

            let html = `
                <div class="table-header">
                    <span>#</span>
                    <span>PLAYER</span>
                    <span style="text-align:center">REGION</span>
                    <span>TIERS</span>
                </div>
            `;

            if (sorted.length === 0) {
                content.innerHTML = html + '<div class="empty">No players found.</div>';
                return;
            }

            const rows = sorted.map((p, i) => {
                const globalRank = sortedOverall.findIndex(x => x.IGN === p.IGN) + 1;
                const rankClass = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
                const medals = ['🥇','🥈','🥉'];
                const rankDisplay = i < 3 && !term
                    ? `<span class="rank-medal">${medals[i]}</span>`
                    : `${i+1}.`;
                
                const title = getTitle(p.totalPoints);
                const region = p.Region ? p.Region.trim() : 'NA';

                const tierBadges = modeKeys.map((k, idx) => {
                    if (!p[k]) return '';
                    const val = p[k].trim().toUpperCase();
                    const ringClass = getTierRingClass(val);
                    return `
                        <div class="tier-badge">
                            <div class="tier-icon-wrap ${ringClass}">
                                <img src="${iconPaths[idx]}" alt="${modeLabels[idx]}" onerror="this.style.display='none'">
                            </div>
                            <span class="tier-label ${val}">${val}</span>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="player-row" onclick="openProfile(${JSON.stringify(p).replace(/"/g,'&quot;')})">
                        <div class="rank-cell ${rankClass}">${rankDisplay}</div>
                        <div class="player-cell">
                            <div class="player-head-3d-wrap"><img src="https://visage.surgeplay.com/bust/80/${p.IGN}" class="player-head-3d" onerror="this.src='https://visage.surgeplay.com/bust/80/c5ad1893-57f0-4a4c-93dc-0e8bef1acce4'"></div>
                            <div class="player-info">
                                <span class="player-name">${p.IGN}</span>
                                <span class="player-title">
                                    <span class="title-diamond">◆</span>
                                    <span class="title-text" style="color:${title.color}">${title.name}</span>
                                    <span class="title-pts">(${p.totalPoints} pts)</span>
                                </span>
                            </div>
                        </div>
                        <div class="region-cell">
                            <span class="region-badge">${region}</span>
                        </div>
                        <div class="tiers-cell">${tierBadges}</div>
                    </div>
                `;
            }).join('');

            content.innerHTML = html + rows;
            content.querySelectorAll('.player-row').forEach((row, i) => {
                row.style.animationDelay = (i * 0.04) + 's';
                row.classList.add('row-animate');
            });
        } else {
            const tierGroups = [1,2,3,4,5].map(tier => {
                return filtered.filter(p => {
                    const val = (p[mode] || '').trim().toUpperCase();
                    return val.includes(tier.toString()) && !val.startsWith('R');
                }).sort((a, b) => {
                    const va = a[mode].toUpperCase(), vb = b[mode].toUpperCase();
                    if (va.startsWith('HT') && vb.startsWith('LT')) return -1;
                    if (va.startsWith('LT') && vb.startsWith('HT')) return 1;
                    return a.IGN.localeCompare(b.IGN);
                });
            });

            const thClasses = ['th1','th2','th3','th4','th5'];

            const cols = [1,2,3,4,5].map((tier, idx) => {
                const players = tierGroups[idx];
                const cards = players.map(p => {
                    const val = (p[mode] || '').trim().toUpperCase();
                    return `
                        <div class="tier-player-card" onclick="openProfile(${JSON.stringify(p).replace(/"/g,'&quot;')})">
                            <div class="tier-player-left">
                                <img src="https://visage.surgeplay.com/face/26/${p.IGN}" class="tier-player-head" onerror="this.src='https://visage.surgeplay.com/face/26/c5ad1893-57f0-4a4c-93dc-0e8bef1acce4'">
                                <span class="tier-player-name">${p.IGN}</span>
                            </div>
                            <span class="tier-label ${val}" style="font-size:10px">${val}</span>
                        </div>
                    `;
                }).join('');

                return `
                    <div>
                        <div class="tier-col-header ${thClasses[idx]}">TIER ${tier}</div>
                        ${cards || '<div style="text-align:center;color:var(--text-dim);font-size:11px;padding:20px 0">No players</div>'}
                    </div>
                `;
            }).join('');

            content.innerHTML = `<div class="tier-grid">${cols}</div>`;
            content.querySelectorAll('.tier-player-card').forEach((card, i) => {
                card.style.animationDelay = (i * 0.03) + 's';
                card.classList.add('card-animate');
            });
        }
    }

    function openProfile(p) {
        const body = document.getElementById('modal-body');
        const globalRank = sortedOverall.findIndex(x => x.IGN === p.IGN) + 1;
        const title = getTitle(p.totalPoints);
        const renderUrl = `https://visage.surgeplay.com/full/256/${p.IGN}`;

        const rankNumColor = globalRank === 1 ? '#e3b341' 
                           : globalRank === 2 ? '#adbac7' 
                           : globalRank === 3 ? '#b08d57' 
                           : (p.Color ? p.Color.trim() : 'white');
        const nameClass = globalRank === 1 ? 'name-gold' : globalRank === 2 ? 'name-silver' : globalRank === 3 ? 'name-bronze' : '';
        const nameColor = (!nameClass && p.Color) ? `style="color:${p.Color.trim()}"` : '';

        const tierBoxes = modeKeys.map((k, i) => `
            <div class="modal-tier-box">
                <div class="modal-tier-box-label">${modeLabels[i]}</div>
                <img src="${iconPaths[i]}" class="modal-tier-icon" onerror="this.style.display='none'">
                <div class="modal-tier-val ${(p[k]||'').toUpperCase()}">${p[k] || '—'}</div>
            </div>
        `).join('');

        body.innerHTML = `
            <div class="modal-header">
                <img src="${renderUrl}" class="modal-skin" onerror="this.src='${FALLBACK_FULL}'">
                <div class="modal-name ${nameClass}" ${nameColor}>${p.IGN}</div>
                <div class="modal-rank-badge" style="margin-top:8px">
                    <span style="color:${title.color}">◆</span>
                    ${title.name}
                </div>
            </div>
            <div class="modal-body">
                <div class="modal-stats">
                    <div class="stat-box">
                        <div class="stat-label">Global Score</div>
                        <div class="stat-value gold">${p.totalPoints}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Global Rank</div>
                        <div class="stat-value" style="color:${rankNumColor}">#${globalRank}</div>
                    </div>
                </div>
                <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:8px">Tier Breakdown</div>
                <div class="modal-tiers">${tierBoxes}</div>
            </div>
        `;

        document.getElementById('modal-overlay').style.display = 'flex';
    }



    document.getElementById('search').addEventListener('input', () => updateView(currentMode));
    init();
</script>
<!-- MODAL -->
<div id="modal-overlay" onclick="this.style.display='none'">
    <div class="modal-box" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="document.getElementById('modal-overlay').style.display='none'">✕</button>
        <div id="modal-body"></div>
    </div>
</div>
</body>
</html>
